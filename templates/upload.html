<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>X-ray Analysis | MedDetect AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
<div class="logo">MedDetect AI</div>
<a href="/" class="back-link">Back to Home</a>
</nav>
<div class="card">
<h1>Pneumonia Detection System</h1>
<p class="subtitle">Upload chest X-ray for AI analysis</p>
<input type="text" id="patientName" placeholder="Patient Name">
<input type="number" id="age" placeholder="Age">
<div class="upload-box">
<label for="xrayImage" class="upload-label">Choose X-ray Image</label>
<input type="file" id="xrayImage" accept="image/*">
</div>
<img id="preview" alt="X-ray preview">
<button id="predictBtn" onclick="uploadData()">Analyze X-ray</button>
<div id="result">Prediction will appear here</div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
